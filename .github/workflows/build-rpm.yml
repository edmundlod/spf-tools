name: Build RPM package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: echo "version=$(echo '${{ github.ref_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Create source tarball
        run: |
          mkdir dist
          git archive \
            --prefix=spf-tools-${{ steps.version.outputs.version }}/ \
            HEAD \
          | gzip > dist/spf-tools-${{ steps.version.outputs.version }}.tar.gz

      - name: Build RPM
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker run --rm \
            -e VERSION \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            almalinux:10 bash -c '
              set -e
              dnf install -y rpm-build rpmdevtools
              rpmdev-setuptree
              cp dist/*.tar.gz ~/rpmbuild/SOURCES/
              rpmbuild -bb --define "pkg_version $VERSION" rpm/spf-tools.spec
              find ~/rpmbuild/RPMS -name "*.rpm" -exec cp {} /src/dist/ \;
            '

      - name: Get RPM filename
        id: rpm
        run: echo "filename=$(ls dist/*.rpm | xargs basename)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.rpm

      - name: Dispatch to rpm repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: edmundlod/rpm
          event-type: package-built
          client-payload: >-
            {
              "rpm_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.rpm.outputs.filename }}",
              "package": "${{ steps.rpm.outputs.filename }}"
            }
