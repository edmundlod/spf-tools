name: Build Debian package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect .deb
        run: |
          mkdir dist
          mv ../*.deb dist/

      - name: Get .deb filename
        id: deb
        run: echo "filename=$(ls dist/*.deb | xargs basename)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb

      - name: Dispatch to apt repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: edmundlod/apt
          event-type: package-built
          client-payload: >-
            {
              "deb_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.deb.outputs.filename }}",
              "package": "${{ steps.deb.outputs.filename }}"
            }
